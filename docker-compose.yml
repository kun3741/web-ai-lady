version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: vla-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - ./docker/data/mongodb:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vla-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - ./docker/data/redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: vla-api
    restart: unless-stopped
    ports:
      - '${APP_PORT:-3000}:3000'
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/virtual-lady
      - REDIS_HOST=redis
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ['node', 'dist/apps/api/main.js']
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  workers:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: vla-workers
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/virtual-lady
      - REDIS_HOST=redis
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ['node', 'dist/apps/workers/main.js']
